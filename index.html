<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coríntios Elite • Estudo Competitivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        
        :root {
            --primary: 234 179 8;
        }
        
        .tail-container {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .heading-font {
            font-family: 'Playfair Display', sans-serif;
        }

        .nav-tab {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .nav-tab.active {
            border-bottom: 4px solid rgb(234 179 8);
            color: rgb(234 179 8);
            font-weight: 600;
        }

        .chapter-card {
            transition: all 0.2s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        
        .chapter-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .verse {
            background: linear-gradient(90deg, #fefce8 0%, #fef9c3 100%);
            padding: 1rem;
            border-radius: 16px;
            border-left: 5px solid rgb(234 179 8);
        }

        .accordion-header {
            transition: all 0.3s ease;
        }
        
        .modal-content {
            scrollbar-width: thin;
        }
    </style>
</head>
<body class="tail-container bg-zinc-50 text-zinc-800">
    <div class="max-w-7xl mx-auto min-h-screen flex flex-col">
        <!-- HEADER -->
        <header class="bg-white border-b border-zinc-200 sticky top-0 z-50 shadow-sm">
            <div class="px-8 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-11 h-11 bg-gradient-to-br from-yellow-500 to-amber-600 rounded-3xl flex items-center justify-center text-white text-3xl shadow-inner">✝️</div>
                    <div>
                        <h1 class="heading-font text-4xl font-bold tracking-tighter text-zinc-900">Coríntios Elite</h1>
                        <p class="text-sm text-zinc-500 -mt-1">Preparação Competitiva Bíblica</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-x-10 text-sm font-medium">
                    <button onclick="switchTab(0)" id="tab-0" class="nav-tab active px-6 py-3 flex items-center gap-x-2 text-zinc-700 hover:text-amber-600">
                        <i class="fa-solid fa-book-open"></i> ESTUDO
                    </button>
                    <button onclick="switchTab(1)" id="tab-1" class="nav-tab px-6 py-3 flex items-center gap-x-2 text-zinc-700 hover:text-amber-600">
                        <i class="fa-solid fa-question-circle"></i> PERGUNTAS
                    </button>
                    <button onclick="switchTab(2)" id="tab-2" class="nav-tab px-6 py-3 flex items-center gap-x-2 text-zinc-700 hover:text-amber-600">
                        <i class="fa-solid fa-calendar-days"></i> PLANO
                    </button>
                </div>

                <div class="flex items-center gap-x-4">
                    <div class="relative w-80">
                        <input id="global-search" 
                               type="text" 
                               placeholder="Buscar capítulos, versículos ou pegadinhas..." 
                               onkeyup="if(event.key==='Enter') performSearch(this.value)"
                               class="w-full bg-white border border-zinc-300 focus:border-amber-400 rounded-3xl py-3 px-5 pl-12 text-sm focus:outline-none">
                        <i class="fa-solid fa-magnifying-glass absolute left-5 top-4 text-zinc-400"></i>
                    </div>
                    <button onclick="toggleTheme()" class="w-11 h-11 flex items-center justify-center rounded-3xl hover:bg-zinc-100 transition">
                        <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
                    </button>
                </div>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <!-- SIDEBAR -->
            <div class="w-80 bg-white border-r border-zinc-100 overflow-y-auto hidden lg:block">
                <div class="p-6">
                    <div onclick="navigateTo('overview')" class="cursor-pointer flex items-center gap-3 px-4 py-3 hover:bg-amber-50 rounded-2xl mb-6">
                        <i class="fa-solid fa-house"></i>
                        <span class="font-medium">Visão Geral</span>
                    </div>

                    <div class="mb-8">
                        <div class="text-xs uppercase tracking-widest text-zinc-400 mb-4 px-4">1 Coríntios</div>
                        <div id="sidebar-1cor" class="space-y-1 text-sm"></div>
                    </div>
                    
                    <div>
                        <div class="text-xs uppercase tracking-widest text-zinc-400 mb-4 px-4">2 Coríntios</div>
                        <div id="sidebar-2cor" class="space-y-1 text-sm"></div>
                    </div>
                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="flex-1 overflow-auto pb-12" id="main-content">
                <!-- TAB 0: ESTUDO -->
                <div id="tab-content-0" class="tab-content">
                    <!-- HERO -->
                    <div class="bg-gradient-to-br from-amber-500 via-yellow-500 to-amber-600 text-white py-20 px-10">
                        <div class="max-w-3xl">
                            <span class="uppercase tracking-[3px] text-amber-200 text-sm font-medium">Preparação para Competição</span>
                            <h1 class="heading-font text-6xl font-bold leading-none mt-3 mb-6">1 &amp; 2 Coríntios</h1>
                            <p class="text-xl opacity-90">Ferramenta completa de estudo bíblico de alto nível</p>
                            <button onclick="navigateTo('overview')" class="mt-8 bg-white text-amber-700 px-8 py-4 rounded-3xl font-semibold flex items-center gap-x-3 hover:scale-105 transition-all">
                                Começar agora <i class="fa-solid fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>

                    <div class="p-10">
                        <!-- VISÃO GERAL -->
                        <div id="overview-section" class="mb-20">
                            <h2 class="heading-font text-4xl font-bold mb-8">Visão Geral dos Livros</h2>
                            <div class="grid md:grid-cols-2 gap-8" id="overview-cards"></div>
                        </div>

                        <!-- ESTRUTURA -->
                        <div class="mb-20">
                            <h2 class="heading-font text-4xl font-bold mb-8">Estrutura dos Livros</h2>
                            <div id="structure-content" class="grid lg:grid-cols-2 gap-8"></div>
                        </div>

                        <!-- ESTUDO POR LIVRO -->
                        <div>
                            <h2 class="heading-font text-4xl font-bold mb-8">Estudo por Capítulo</h2>
                            <div class="flex gap-3 mb-8 border-b pb-6">
                                <button onclick="filterChapters(1)" id="book-filter-1" class="px-6 py-2 rounded-3xl border font-medium active-book-filter">1 Coríntios</button>
                                <button onclick="filterChapters(2)" id="book-filter-2" class="px-6 py-2 rounded-3xl border font-medium">2 Coríntios</button>
                            </div>
                            <div id="chapters-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                        </div>
                    </div>
                </div>

                <!-- TAB 1: PERGUNTAS -->
                <div id="tab-content-1" class="tab-content hidden p-10">
                    <h2 class="heading-font text-4xl font-bold mb-8">Banco de Questões</h2>
                    
                    <div class="flex flex-wrap gap-3 mb-8" id="question-filters"></div>
                    
                    <div id="questions-container" class="space-y-8"></div>
                </div>

                <!-- TAB 2: PLANO -->
                <div id="tab-content-2" class="tab-content hidden p-10">
                    <h2 class="heading-font text-4xl font-bold mb-8">Plano de Estudos - 28 Dias</h2>
                    <div id="plan-timeline" class="space-y-8"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- CHAPTER MODAL -->
    <div id="chapter-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
        <div class="bg-white w-full max-w-4xl max-h-[95vh] overflow-hidden rounded-3xl shadow-2xl flex flex-col">
            <div class="px-8 py-6 border-b flex items-center justify-between bg-white sticky top-0 z-10">
                <h3 id="modal-title" class="heading-font text-3xl font-bold"></h3>
                <button onclick="closeModal()" class="text-4xl text-zinc-400 hover:text-zinc-600 leading-none">×</button>
            </div>
            <div id="modal-body" class="overflow-auto flex-1 p-8 space-y-12 modal-content"></div>
        </div>
    </div>

    <script>
        // ====================== DATA FROM TEXT ======================
        const studyData = {
            overview: {
                oneCor: {
                    title: "1 Coríntios",
                    subtitle: "Correção, Doutrina e Unidade",
                    author: "Paulo (com Sóstenes)",
                    date: "~53-55 d.C., de Éfeso",
                    purpose: "Corrigir divisões, imoralidade, abusos no culto e responder perguntas da igreja."
                },
                twoCor: {
                    title: "2 Coríntios",
                    subtitle: "Defesa Apostólica e Reconciliação",
                    author: "Paulo (com Timóteo)",
                    date: "~55-56 d.C., da Macedônia",
                    purpose: "Defender autoridade, promover reconciliação e instruir sobre oferta."
                }
            },
            chapters: [
                // 1 Coríntios - populated from the full text
                {id: 101, book: 1, chapter: 1, title: "Divisões e Sabedoria da Cruz", importance: "ALTÍSSIMO"},
                {id: 102, book: 1, chapter: 2, title: "Sabedoria Revelada pelo Espírito", importance: "ALTO"},
                {id: 103, book: 1, chapter: 3, title: "Carnais, Templo de Deus e Obras", importance: "ALTÍSSIMO"},
                {id: 104, book: 1, chapter: 4, title: "Ministério Apostólico", importance: "ALTO"},
                {id: 105, book: 1, chapter: 5, title: "Imoralidade e Disciplina", importance: "ALTÍSSIMO"},
                {id: 106, book: 1, chapter: 6, title: "Processos e Santidade do Corpo", importance: "ALTÍSSIMO"},
                {id: 107, book: 1, chapter: 7, title: "Casamento e Solteirice", importance: "ALTO"},
                {id: 108, book: 1, chapter: 8, title: "Carnes Sacrificadas - Princípio", importance: "ALTÍSSIMO"},
                {id: 109, book: 1, chapter: 9, title: "Renúncia de Direitos", importance: "ALTÍSSIMO"},
                {id: 110, book: 1, chapter: 10, title: "Exemplos de Israel e Idolatria", importance: "MÁXIMO"},
                {id: 111, book: 1, chapter: 11, title: "Ceia do Senhor", importance: "MÁXIMO"},
                {id: 112, book: 1, chapter: 12, title: "Dons Espirituais e Corpo", importance: "MÁXIMO"},
                {id: 113, book: 1, chapter: 13, title: "O Hino do Amor", importance: "MÁXIMO ABSOLUTO"},
                {id: 114, book: 1, chapter: 14, title: "Ordem no Culto", importance: "ALTÍSSIMO"},
                {id: 115, book: 1, chapter: 15, title: "A Ressurreição", importance: "MÁXIMO ABSOLUTO"},
                {id: 116, book: 1, chapter: 16, title: "Instruções Finais", importance: "MÉDIO"},
                
                // 2 Coríntios
                {id: 201, book: 2, chapter: 1, title: "Consolação nas Tribulações", importance: "ALTO"},
                {id: 202, book: 2, chapter: 2, title: "Perdão e Triunfo em Cristo", importance: "ALTO"},
                {id: 203, book: 2, chapter: 3, title: "Ministério da Nova Aliança", importance: "MÁXIMO"},
                {id: 204, book: 2, chapter: 4, title: "Tesouro em Vasos de Barro", importance: "MÁXIMO"},
                {id: 205, book: 2, chapter: 5, title: "Nova Criação e Reconciliação", importance: "MÁXIMO ABSOLUTO"},
                {id: 206, book: 2, chapter: 6, title: "Jugo Desigual", importance: "ALTÍSSIMO"},
                {id: 207, book: 2, chapter: 7, title: "Tristeza Segundo Deus", importance: "ALTO"},
                {id: 208, book: 2, chapter: 8, title: "Generosidade dos Macedônios", importance: "ALTÍSSIMO"},
                {id: 209, book: 2, chapter: 9, title: "Princípios de Semeadura", importance: "ALTÍSSIMO"},
                {id: 210, book: 2, chapter: 10, title: "Armas Espirituais", importance: "ALTÍSSIMO"},
                {id: 211, book: 2, chapter: 11, title: "Falsos Apóstolos e Sofrimentos", importance: "MÁXIMO"},
                {id: 212, book: 2, chapter: 12, title: "Espinho na Carne", importance: "MÁXIMO ABSOLUTO"},
                {id: 213, book: 2, chapter: 13, title: "Examinai-vos", importance: "ALTO"}
            ],
            questions: [
                {id:1, book:1, chapter:1, difficulty:"fácil", type:"múltipla", q:"Quem relatou as divisões?", a:"Casa de Cloé"},
                {id:2, book:1, chapter:13, difficulty:"difícil", type:"completo", q:"O amor jamais...", a:"acaba"},
                {id:3, book:1, chapter:15, difficulty:"competição", type:"verdadeiro-falso", q:"O último inimigo é Satanás", a:"Falso (é a morte)"},
                // More questions can be added from the text
            ],
            plan: [
                {day: "1-7", focus: "1 Coríntios completo + resumos", type: "fundação"},
                {day: "8-14", focus: "Revisão 1Cor + 2Cor 1-7", type: "consolidação"},
                {day: "15-21", focus: "2Cor 8-13 + conexões", type: "finalização"},
                {day: "22-28", focus: "Revisão pesada, simulados, memorização", type: "polimento"}
            ]
        };

        let currentBookFilter = null;
        let currentTab = 0;

        function initTailwind() {
            // Tailwind already loaded
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-content-${tab}`).classList.remove('hidden');
        }

        function renderOverview() {
            const container = document.getElementById('overview-cards');
            container.innerHTML = `
                <div class="bg-white border rounded-3xl p-8">
                    <h3 class="text-2xl font-semibold mb-4">${studyData.overview.oneCor.title}</h3>
                    <p class="text-amber-600 mb-6">${studyData.overview.oneCor.subtitle}</p>
                    <div class="space-y-3 text-sm">
                        <p><strong>Autor:</strong> ${studyData.overview.oneCor.author}</p>
                        <p><strong>Data:</strong> ${studyData.overview.oneCor.date}</p>
                        <p><strong>Propósito:</strong> ${studyData.overview.oneCor.purpose}</p>
                    </div>
                </div>
                <div class="bg-white border rounded-3xl p-8">
                    <h3 class="text-2xl font-semibold mb-4">${studyData.overview.twoCor.title}</h3>
                    <p class="text-amber-600 mb-6">${studyData.overview.twoCor.subtitle}</p>
                    <div class="space-y-3 text-sm">
                        <p><strong>Autor:</strong> ${studyData.overview.twoCor.author}</p>
                        <p><strong>Data:</strong> ${studyData.overview.twoCor.date}</p>
                        <p><strong>Propósito:</strong> ${studyData.overview.twoCor.purpose}</p>
                    </div>
                </div>
            `;
        }

        function renderStructure() {
            const container = document.getElementById('structure-content');
            container.innerHTML = `
                <div class="bg-white border rounded-3xl p-8">
                    <h4 class="font-semibold text-xl mb-6">1 Coríntios - Blocos Principais</h4>
                    <ul class="space-y-4 text-sm">
                        <li class="flex gap-3"><span class="font-mono text-amber-500">1-4</span> <span>Divisões e Sabedoria</span></li>
                        <li class="flex gap-3"><span class="font-mono text-amber-500">5-7</span> <span>Problemas Morais</span></li>
                        <li class="flex gap-3"><span class="font-mono text-amber-500">8-10</span> <span>Liberdade e Ídolos</span></li>
                        <li class="flex gap-3"><span class="font-mono text-amber-500">11-14</span> <span>Culto e Dons</span></li>
                        <li class="flex gap-3"><span class="font-mono text-amber-500">15</span> <span>Ressurreição (Máxima)</span></li>
                    </ul>
                </div>
                <div class="bg-white border rounded-3xl p-8">
                    <h4 class="font-semibold text-xl mb-6">2 Coríntios - Blocos Principais</h4>
                    <ul class="space-y-4 text-sm">
                        <li class="flex gap-3"><span class="font-mono text-amber-500">1-7</span> <span>Defesa e Reconciliação</span></li>
                        <li class="flex gap-3"><span class="font-mono text-amber-500">8-9</span> <span>Generosidade</span></li>
                        <li class="flex gap-3"><span class="font-mono text-amber-500">10-13</span> <span>Defesa Final</span></li>
                    </ul>
                </div>
            `;
        }

        function renderChapters(filter = null) {
            const container = document.getElementById('chapters-grid');
            container.innerHTML = '';
            
            const filtered = studyData.chapters.filter(ch => !filter || ch.book === filter);
            
            filtered.forEach(ch => {
                const card = document.createElement('div');
                card.className = `chapter-card bg-white border border-zinc-200 rounded-3xl p-7 cursor-pointer`;
                card.innerHTML = `
                    <div class="flex justify-between">
                        <div>
                            <span class="inline px-4 py-1.5 text-xs font-mono bg-amber-100 text-amber-700 rounded-3xl">${ch.book === 1 ? '1Co' : '2Co'} ${ch.chapter}</span>
                            <h4 class="font-semibold mt-5 text-lg leading-tight">${ch.title}</h4>
                        </div>
                        <span class="text-2xl text-amber-400">→</span>
                    </div>
                    <div class="mt-6">
                        <span class="inline-block px-5 py-1 text-[10px] font-medium bg-zinc-100 rounded-3xl">${ch.importance}</span>
                    </div>
                `;
                card.onclick = () => showChapterModal(ch);
                container.appendChild(card);
            });
        }

        function showChapterModal(ch) {
            const modal = document.getElementById('chapter-modal');
            const titleEl = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');
            
            titleEl.textContent = `${ch.book === 1 ? '1' : '2'} Coríntios ${ch.chapter} — ${ch.title}`;
            
            // In a full version, content would be detailed per chapter.
            // Here we use a rich template based on the provided text structure.
            body.innerHTML = `
                <div class="prose prose-zinc max-w-none">
                    <div class="grid grid-cols-2 gap-8">
                        <div>
                            <h4 class="font-semibold mb-2 text-amber-700">Tema Principal</h4>
                            <p class="text-zinc-600">Extraído do material: ${ch.title}</p>
                        </div>
                        <div>
                            <h4 class="font-semibold mb-2 text-amber-700">Importância</h4>
                            <span class="px-6 py-2 bg-amber-100 text-amber-700 rounded-3xl text-sm">${ch.importance}</span>
                        </div>
                    </div>
                    
                    <div class="border-l-4 border-amber-400 pl-6 py-1 my-8">
                        <p class="italic">"Insira aqui o resumo detalhado completo conforme o texto-base para este capítulo específico."</p>
                    </div>
                    
                    <h4 class="font-semibold mb-4">Versículos-chave</h4>
                    <div class="verse">
                        <strong>Exemplos principais:</strong> (conforme material fornecido)
                    </div>
                    
                    <div class="mt-12">
                        <button onclick="alert('Progresso salvo! ✅')" class="px-8 py-4 bg-amber-500 text-white rounded-3xl font-medium flex items-center gap-x-3">
                            <i class="fa-solid fa-check"></i> Marcar como estudado
                        </button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('chapter-modal').classList.add('hidden');
        }

        function filterChapters(book) {
            currentBookFilter = book;
            document.getElementById('book-filter-1').classList.toggle('active-book-filter', book === 1);
            document.getElementById('book-filter-2').classList.toggle('active-book-filter', book === 2);
            renderChapters(book);
        }

        function renderSidebar() {
            const one = document.getElementById('sidebar-1cor');
            const two = document.getElementById('sidebar-2cor');
            
            one.innerHTML = studyData.chapters.filter(c => c.book === 1).map(c => `
                <div onclick="showChapterModal({book:1,chapter:${c.chapter},title:'${c.title}'})" class="px-4 py-2.5 hover:bg-amber-50 rounded-2xl cursor-pointer text-sm flex justify-between">
                    <span>Cap. ${c.chapter}</span>
                    <span class="text-amber-400 text-xs">${c.importance}</span>
                </div>
            `).join('');
            
            two.innerHTML = studyData.chapters.filter(c => c.book === 2).map(c => `
                <div onclick="showChapterModal({book:2,chapter:${c.chapter},title:'${c.title}'})" class="px-4 py-2.5 hover:bg-amber-50 rounded-2xl cursor-pointer text-sm flex justify-between">
                    <span>Cap. ${c.chapter}</span>
                    <span class="text-amber-400 text-xs">${c.importance}</span>
                </div>
            `).join('');
        }

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = studyData.questions.map(q => `
                <div class="bg-white border rounded-3xl p-8">
                    <div class="flex items-center gap-x-4 mb-4">
                        <span class="px-4 py-1 text-xs bg-zinc-100 rounded-3xl">${q.book === 1 ? '1Co' : '2Co'} ${q.chapter}</span>
                        <span class="px-4 py-1 text-xs bg-rose-100 text-rose-700 rounded-3xl">${q.difficulty}</span>
                    </div>
                    <p class="font-medium">${q.q}</p>
                    <div class="mt-6 pt-6 border-t text-emerald-700 font-medium">Resposta: ${q.a}</div>
                </div>
            `).join('');
        }

        function renderPlan() {
            const container = document.getElementById('plan-timeline');
            container.innerHTML = studyData.plan.map((p, i) => `
                <div class="flex gap-8 items-start">
                    <div class="w-32 shrink-0">
                        <div class="text-amber-600 font-mono">Semana ${Math.floor(i/4)+1}</div>
                        <div class="text-sm font-medium">${p.day}</div>
                    </div>
                    <div class="flex-1 bg-white border rounded-3xl p-8">
                        <p class="font-semibold">${p.focus}</p>
                        <span class="inline-block mt-4 text-xs px-6 py-2 bg-emerald-100 text-emerald-700 rounded-3xl">${p.type}</span>
                    </div>
                </div>
            `).join('');
        }

        function performSearch(term) {
            if (!term) return;
            term = term.toLowerCase();
            const results = studyData.chapters.filter(ch => 
                ch.title.toLowerCase().includes(term)
            );
            if (results.length) {
                switchTab(0);
                renderChapters(results[0].book);
                alert(`Encontrado: ${results[0].title}. Abra o capítulo para detalhes.`);
            }
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                document.getElementById('theme-icon').classList.replace('fa-sun', 'fa-moon');
            } else {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
            }
        }

        function navigateTo(section) {
            switchTab(0);
            document.getElementById('overview-section').scrollIntoView({behavior: "smooth"});
        }

        function initialize() {
            renderOverview();
            renderStructure();
            renderChapters();
            renderSidebar();
            renderQuestions();
            renderPlan();
            
            // Keyboard
            document.addEventListener('keydown', e => {
                if (e.key === "Escape") {
                    const modal = document.getElementById('chapter-modal');
                    if (!modal.classList.contains('hidden')) closeModal();
                }
            });
            
            switchTab(0);
